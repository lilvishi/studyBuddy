<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>iPad Notes + AI Sidebar</title>
  <style>
    :root {
      --bg: #f7f8fc;
      --panel: #ffffff;
      --line: #d8e6ff;
      --ink: #111827;
      --muted: #6b7280;
      --accent: #2563eb;
      --border: #e5e7eb;
    }

    * { 
        box-sizing: border-box; 
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
    }

    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--ink);
      overflow: hidden;
    }

    .app {
      height: 100%;
      display: grid;
      grid-template-columns: 7fr 3fr;
    }

    .notes-pane {
      position: relative;
      border-right: 1px solid var(--border);
      background: #fbfdff;
    }

    .toolbar {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      display: flex;
      gap: 8px;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(6px);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px;
    }

    .toolbar button {
      border: 1px solid var(--border);
      background: white;
      color: var(--ink);
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
    }

    .toolbar button.active {
      border-color: var(--accent);
      color: var(--accent);
      font-weight: 600;
    }

    .stack {
      position: absolute;
      inset: 0;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    .sidebar {
      background: var(--panel);
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .sidebar h2 {
      margin: 2px 0 0;
      font-size: 16px;
      font-weight: 700;
    }

    .status {
      font-size: 12px;
      color: var(--muted);
      min-height: 18px;
    }

    .response {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      white-space: pre-wrap;
      line-height: 1.45;
      font-size: 15px;
      background: #fcfcff;
      overflow: auto;
      flex: 1;
    }

    .hint {
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="notes-pane">
      <div class="toolbar">
        <button id="penBtn" class="active">Pen</button>
        <button id="eraserBtn">Eraser</button>
        <button id="clearBtn">Clear</button>
      </div>

      <div class="stack">
        <canvas id="paperCanvas"></canvas>
        <canvas id="drawCanvas"></canvas>
      </div>
    </section>

    <aside class="sidebar">
      <h2>AI Assistant</h2>
      <div class="status" id="status">Write notes, then pause for auto-analysis.</div>
      <div class="response" id="response">Your explanation or answer will appear here...</div>
      <div class="hint">Tip: End with <strong>?</strong> for Q&A, or <strong>=</strong> for equation solving.</div>
    </aside>
  </div>

  <script>
    const API_BASE = "http://your_ip_address:8000";
    const PROCESS_URL = `${API_BASE}/process_canvas`;
    const DEBOUNCE_MS = 4000;

    const paperCanvas = document.getElementById("paperCanvas");
    const drawCanvas = document.getElementById("drawCanvas");
    const paperCtx = paperCanvas.getContext("2d");
    const drawCtx = drawCanvas.getContext("2d");

    const penBtn = document.getElementById("penBtn");
    const eraserBtn = document.getElementById("eraserBtn");
    const clearBtn = document.getElementById("clearBtn");
    const statusEl = document.getElementById("status");
    const responseEl = document.getElementById("response");

    let mode = "pen"; 
    let isDrawing = false;
    let lastX = 0;
    let lastY = 0;
    let debounceTimer = null;
    let inFlight = false;
    let queued = false;
    let dpr = Math.max(1, window.devicePixelRatio || 1);

    let bMinX = Infinity, bMinY = Infinity, bMaxX = -Infinity, bMaxY = -Infinity;

    function resetBoundingBox() {
      bMinX = Infinity; bMinY = Infinity; bMaxX = -Infinity; bMaxY = -Infinity;
    }

    function expandBoundingBox(x, y) {
      if (x < bMinX) bMinX = x;
      if (x > bMaxX) bMaxX = x;
      if (y < bMinY) bMinY = y;
      if (y > bMaxY) bMaxY = y;
    }

    function resizeCanvases() {
      const rect = drawCanvas.getBoundingClientRect();
      dpr = Math.max(1, window.devicePixelRatio || 1);

      [paperCanvas, drawCanvas].forEach((c) => {
        c.width = Math.floor(rect.width * dpr);
        c.height = Math.floor(rect.height * dpr);
      });

      [paperCtx, drawCtx].forEach((ctx) => ctx.setTransform(dpr, 0, 0, dpr, 0, 0));

      drawLinedPaper();
      resetDrawingContext();
    }

    function drawLinedPaper() {
      const w = paperCanvas.clientWidth;
      const h = paperCanvas.clientHeight;

      paperCtx.clearRect(0, 0, w, h);
      paperCtx.fillStyle = "#fbfdff";
      paperCtx.fillRect(0, 0, w, h);

      const spacing = 30;
      paperCtx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue("--line").trim() || "#d8e6ff";
      paperCtx.lineWidth = 1;

      for (let y = spacing; y < h; y += spacing) {
        paperCtx.beginPath();
        paperCtx.moveTo(0, y + 0.5);
        paperCtx.lineTo(w, y + 0.5);
        paperCtx.stroke();
      }

      paperCtx.strokeStyle = "#ffd2d2";
      paperCtx.beginPath();
      paperCtx.moveTo(42, 0);
      paperCtx.lineTo(42, h);
      paperCtx.stroke();
    }

    function resetDrawingContext() {
      drawCtx.lineCap = "round";
      drawCtx.lineJoin = "round";
      drawCtx.strokeStyle = "#111827";
      drawCtx.lineWidth = 3;
      drawCtx.globalCompositeOperation = "source-over";
    }

    function setMode(nextMode) {
      mode = nextMode;
      penBtn.classList.toggle("active", mode === "pen");
      eraserBtn.classList.toggle("active", mode === "eraser");

      if (mode === "pen") {
        drawCtx.globalCompositeOperation = "source-over";
        drawCtx.strokeStyle = "#111827";
        drawCtx.lineWidth = 3;
      } else {
        drawCtx.globalCompositeOperation = "destination-out";
        drawCtx.lineWidth = 18;
      }
    }

    penBtn.addEventListener("click", () => setMode("pen"));
    eraserBtn.addEventListener("click", () => setMode("eraser"));
    clearBtn.addEventListener("click", () => {
      drawCtx.clearRect(0, 0, drawCanvas.clientWidth, drawCanvas.clientHeight);
      scheduleProcessing();
    });

    function getPoint(e) {
      const rect = drawCanvas.getBoundingClientRect();
      return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }

    function startDraw(e) {
      if (e.pointerType === "mouse" && e.button !== 0) return;
      isDrawing = true;
      const p = getPoint(e);
      lastX = p.x;
      lastY = p.y;
      if (mode === "pen") expandBoundingBox(p.x, p.y);
      drawCanvas.setPointerCapture(e.pointerId);
    }

    function moveDraw(e) {
      if (!isDrawing) return;
      const p = getPoint(e);

      drawCtx.beginPath();
      drawCtx.moveTo(lastX, lastY);
      drawCtx.lineTo(p.x, p.y);
      drawCtx.stroke();

      if (mode === "pen") expandBoundingBox(p.x, p.y);

      lastX = p.x;
      lastY = p.y;
    }

    function endDraw(e) {
      if (!isDrawing) return;
      isDrawing = false;
      try { drawCanvas.releasePointerCapture(e.pointerId); } catch (_) {}
      if (bMaxX !== -Infinity) scheduleProcessing();
    }

    drawCanvas.addEventListener("pointerdown", startDraw);
    drawCanvas.addEventListener("pointermove", moveDraw);
    drawCanvas.addEventListener("pointerup", endDraw);
    drawCanvas.addEventListener("pointercancel", endDraw);
    drawCanvas.addEventListener("pointerleave", (e) => {
      if (e.buttons === 0) endDraw(e);
    });

    function scheduleProcessing() {
      if (debounceTimer) clearTimeout(debounceTimer);
      statusEl.textContent = "Waiting for pause...";
      debounceTimer = setTimeout(processCanvasImage, DEBOUNCE_MS);
    }

    function getCroppedCanvasDataURL() {
      const padding = 20;
      const cropX = Math.max(0, (bMinX - padding) * dpr);
      const cropY = Math.max(0, (bMinY - padding) * dpr);
      const cropW = Math.min(drawCanvas.width, ((bMaxX - bMinX) + padding * 2) * dpr);
      const cropH = Math.min(drawCanvas.height, ((bMaxY - bMinY) + padding * 2) * dpr);

      const tmp = document.createElement("canvas");
      tmp.width = cropW;
      tmp.height = cropH;
      const ctx = tmp.getContext("2d");

      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, cropW, cropH);
      ctx.drawImage(drawCanvas, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);

      return tmp.toDataURL("image/png");
    }

    async function processCanvasImage() {
      if (inFlight) {
        queued = true;
        return;
      }

      inFlight = true;
      statusEl.textContent = "Analyzing handwriting...";

      try {
        const dataUrl = getCroppedCanvasDataURL();
        resetBoundingBox();

        const res = await fetch(PROCESS_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ image_base64: dataUrl }),
        });

        if (!res.ok) {
          const errText = await res.text();
          // ✅ Give a friendlier message for quota errors
          if (res.status === 429) {
            throw new Error("API quota exceeded — wait a moment and try again.");
          }
          throw new Error(`HTTP ${res.status}: ${errText}`);
        }

        const data = await res.json();
        const newResponseHtml = `<strong>Result:</strong><br>${data.response}<hr style="border:0; border-top:1px solid #e5e7eb; margin: 10px 0;">`;
        responseEl.innerHTML = newResponseHtml + responseEl.innerHTML;
        statusEl.textContent = "Ready.";

      } catch (err) {
        // ✅ Removed the Python traceback lines that were here — pure JS now
        console.error("Processing error:", err);
        statusEl.textContent = "Error — see below.";
        const errorHtml = `<div style="color: #dc2626; padding: 10px; background: #fee2e2; border-radius: 8px;"><strong>Error:</strong><br>${err.message}</div><hr style="border:0; border-top:1px solid #e5e7eb; margin: 10px 0;">`;
        responseEl.innerHTML = errorHtml + responseEl.innerHTML;

      } finally {
        inFlight = false;
        if (queued) {
          queued = false;
          scheduleProcessing();
        }
      }
    }

    window.addEventListener("resize", resizeCanvases);
    resizeCanvases();
    setMode("pen");
  </script>
</body>
</html>
